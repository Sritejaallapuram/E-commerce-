DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#007bff;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1000px;
    margin:30px auto;
}

.cart-item{
    background:white;
    display:flex;
    align-items:center;
    gap:20px;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.cart-item img{
    width:120px;
    height:90px;
    object-fit:cover;
    border-radius:8px;
}

.details{
    flex:1;
}

.details h3{
    margin-bottom:8px;
}

.price{
    color:#007bff;
    font-weight:bold;
}

.remove-btn{
    background:red;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
}

.summary{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.summary h2{
    margin-bottom:15px;
}

.total{
    font-size:24px;
    color:#007bff;
    margin-bottom:20px;
}

.clear-btn{
    background:#222;
    color:white;
    border:none;
    padding:12px 20px;
    cursor:pointer;
    border-radius:5px;
}

.checkout-btn{
    background:#28a745;
    color:white;
    border:none;
    padding:12px 20px;
    cursor:pointer;
    border-radius:5px;
    margin-left:10px;
}

.back-btn{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:#007bff;
    font-weight:bold;
}

.empty{
    text-align:center;
    font-size:22px;
    margin-top:50px;
}

@media(max-width:768px){

.cart-item{
    flex-direction:column;
    text-align:center;
}

.cart-item img{
    width:100%;
    height:200px;
}

.checkout-btn,
.clear-btn{
    width:100%;
    margin:10px 0;
}

}

</style>

</head>
<body>

<header>
<h1>
<i class="fas fa-shopping-cart"></i>
 Shopping Cart
</h1>
</header>

<div class="container">

<div id="cart-container">

</div>

<div class="summary">

<h2>Order Summary</h2>

<div class="total">
Total: $<span id="total-price">0</span>
</div>

<button class="clear-btn"
onclick="clearCart()">
Clear Cart
</button>

<button class="checkout-btn"
onclick="checkout()">
Checkout
</button>

</div>

<a href="index.html" class="back-btn">
← Continue Shopping
</a>

</div>

<script>

let cart =
JSON.parse(localStorage.getItem("cart"))
|| [];

const container =
document.getElementById("cart-container");

const totalPrice =
document.getElementById("total-price");

function displayCart(){

container.innerHTML="";

let total=0;

if(cart.length===0){

container.innerHTML=`
<div class="empty">
Your cart is empty.
</div>
`;

totalPrice.innerText="0";

return;

}

cart.forEach((item,index)=>{

const price =
parseFloat(
item.price.replace("$","")
);

total += price;

container.innerHTML += `

<div class="cart-item">

<img src="${item.image}">

<div class="details">

<h3>${item.name}</h3>

<p class="price">
${item.price}
</p>

</div>

<button
class="remove-btn"
onclick="removeItem(${index})">

Remove

</button>

</div>

`;

});

totalPrice.innerText =
total.toFixed(2);

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

displayCart();

}

function clearCart(){

cart=[];

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

displayCart();

}

function checkout(){

if(cart.length===0){

alert(
"Your cart is empty!"
);

return;

}

alert(
"Order placed successfully!"
);

cart=[];

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

displayCart();

}

displayCart();

</script>

</body>
</html>
